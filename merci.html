<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci - RPPQ</title>
    <!-- Intégration de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#071630',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Importation de la police Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #071630;
            color: #ffffff;
        }
        
        /* Animation d'apparition */
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="max-w-lg w-full bg-white/5 p-10 md:p-14 rounded-3xl border border-white/10 backdrop-blur-sm shadow-2xl fade-in-up">
        
        <!-- Icône de succès animée -->
        <div class="mx-auto flex items-center justify-center h-24 w-24 rounded-full bg-green-500/10 border border-green-500/20 mb-8">
            <svg class="h-12 w-12 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        
        <h1 class="text-4xl md:text-5xl font-extrabold mb-6 tracking-tight">Merci,  !</h1>
        
        <p class="text-gray-300 text-lg md:text-xl mb-10 leading-relaxed">
            Votre message a été transmis avec succès.  RPPQ a bien reçu votre demande et communiquera avec vous dans les plus brefs délais.
        </p>
        
        <a href="index.html" class="inline-flex items-center justify-center w-full sm:w-auto bg-white text-navy font-bold py-4 px-10 rounded-full hover:bg-gray-200 hover:scale-105 transition-all duration-300 shadow-lg">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Retour à l'accueil
        </a>
        
    </div>

</body>
</html>
